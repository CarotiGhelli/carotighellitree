<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Albero Genealogico — Caroti Ghelli</title>
  <link rel="stylesheet" href="styles.css?v=4" />
</head>
<body>

  <header class="toolbar">
    <div class="brand">
      <span class="logo">🌳</span>
      <span class="brand-text">Albero Genealogico</span>
    </div>

    <div class="toolbar-actions">
      <button id="btnAdd" class="btn btn-primary">+ Persona</button>

      <label class="btn" title="Importa un file GEDCOM (.ged)">
        Importa GEDCOM
        <input type="file" id="fileGedcom" accept=".ged,.gedcom,text/plain" hidden />
      </label>
      <button id="btnExportGed" class="btn">Esporta GEDCOM</button>

      <span class="sep"></span>

      <button id="btnExportJson" class="btn">Backup</button>
      <label class="btn">
        Ripristina
        <input type="file" id="fileJson" accept=".json,application/json" hidden />
      </label>

      <span class="sep"></span>

      <div class="zoom-group">
        <button id="btnZoomOut" class="btn btn-icon" title="Riduci">−</button>
        <button id="btnZoomReset" class="btn btn-icon" title="Adatta">⤢</button>
        <button id="btnZoomIn" class="btn btn-icon" title="Ingrandisci">+</button>
      </div>

      <button id="btnReset" class="btn btn-danger">Svuota</button>
    </div>
  </header>

  <div id="syncStatus" class="sync-status" hidden></div>

  <main id="viewport" class="viewport">
    <div id="world" class="world">
      <svg id="links" class="links" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="cards" class="cards"></div>
    </div>
    <div id="emptyHint" class="empty-hint" hidden>
      <p>L'albero è vuoto.</p>
      <p>Premi <strong>+ Persona</strong> per iniziare, oppure <strong>Importa GEDCOM</strong>.</p>
    </div>
    <div class="hint-pan">Trascina per spostare · rotellina per zoom</div>
  </main>

  <!-- Pannello modifica persona -->
  <div id="overlay" class="overlay" hidden></div>
  <aside id="editor" class="editor" hidden>
    <div class="editor-head">
      <h2 id="editorTitle">Modifica persona</h2>
      <button id="editorClose" class="btn btn-icon">✕</button>
    </div>
    <div class="editor-body">
      <div class="photo-row">
        <div id="photoPreview" class="photo-preview">👤</div>
        <div class="photo-actions">
          <label class="btn btn-sm">
            Carica foto
            <input type="file" id="photoInput" accept="image/*" hidden />
          </label>
          <button id="photoRemove" class="btn btn-sm">Rimuovi</button>
        </div>
      </div>
      <label class="field">
        <span>Nome</span>
        <input type="text" id="fFirst" placeholder="Nome" />
      </label>
      <label class="field">
        <span>Cognome</span>
        <input type="text" id="fLast" placeholder="Cognome" />
      </label>
      <label class="field">
        <span>Sesso</span>
        <select id="fSex">
          <option value="M">Maschio</option>
          <option value="F">Femmina</option>
          <option value="U">Non specificato</option>
        </select>
      </label>
      <div class="field-row">
        <label class="field">
          <span>Data di nascita</span>
          <input type="text" id="fBirth" placeholder="es. 12 MAR 1950" />
        </label>
        <label class="field">
          <span>Luogo di nascita</span>
          <input type="text" id="fBirthPlace" placeholder="Città" />
        </label>
      </div>
      <div class="field-row">
        <label class="field">
          <span>Data di morte</span>
          <input type="text" id="fDeath" placeholder="(vuoto se in vita)" />
        </label>
        <label class="field">
          <span>Luogo di morte</span>
          <input type="text" id="fDeathPlace" placeholder="Città" />
        </label>
      </div>
      <label class="field">
        <span>Note</span>
        <textarea id="fNotes" rows="3" placeholder="Annotazioni libere"></textarea>
      </label>
      <fieldset class="relations">
        <legend>Relazioni</legend>
        <div class="rel-buttons">
          <button id="relAddPartner" class="btn btn-sm">+ Coniuge/Partner</button>
          <button id="relAddChild" class="btn btn-sm">+ Figlio/a</button>
          <button id="relAddParents" class="btn btn-sm">+ Genitori</button>
        </div>
        <div id="relList" class="rel-list"></div>
      </fieldset>
    </div>
    <div class="editor-foot">
      <button id="btnDelete" class="btn btn-danger">Elimina persona</button>
      <button id="btnSave" class="btn btn-primary">Salva</button>
    </div>
  </aside>

  <!-- Firebase SDKs (solo app + firestore, senza auth) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script src="firebase-config.js"></script>
  <script src="gedcom.js?v=4"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
